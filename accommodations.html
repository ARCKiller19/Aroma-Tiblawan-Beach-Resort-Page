<!DOCTYPE html>
<html lang="ceb-PH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View our relaxing, budget-friendly beachfront cottages and air-conditioned suites." />
  <title>Accommodations — Aroma Tiblawan Beach Resort</title>
  
  <link rel="icon" href="assets/images/LOGO.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="assets/styles/main.css" />
  
  <style>
    /* ══════════════════════════════════════════
       HERO SECTION
    ══════════════════════════════════════════ */
    #accom-hero {
      position: relative;
      padding: calc(72px + var(--gap-xxl)) var(--gap-md) var(--gap-xl);
      background: var(--ocean-deep);
      overflow: hidden;
      min-height: 40vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .accom-hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/images/Dark/Dark 2.JPG');
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      z-index: 0;
    }
    .accom-hero-content {
      position: relative;
      z-index: 1;
      max-width: var(--container);
      margin: 0 auto;
      width: 100%;
      color: #fff;
    }
    .accom-hero-content .eyebrow {
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-light);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: var(--gap-sm);
    }
    .accom-hero-content .eyebrow::before { content:''; width:28px; height:1px; background:var(--teal-light); opacity:0.7; }
    .accom-hero-content h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 400;
      margin-bottom: 0.6rem;
    }
    .accom-hero-content p {
      font-size: 0.98rem;
      color: rgba(255,255,255,0.7);
      max-width: 500px;
      line-height: 1.6;
    }

    /* ══════════════════════════════════════════
       TIME BANNER (From Screenshot)
    ══════════════════════════════════════════ */
    .time-banner {
      background: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--sand-dark);
    }
    @media (max-width: 600px) { .time-banner { grid-template-columns: 1fr; } }
    
    .time-block {
      padding: var(--gap-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap-lg);
    }
    .time-block:first-child { border-right: 1px solid var(--sand-dark); }
    .time-icon { font-size: 2.4rem; }
    .time-details h4 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }
    .time-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .time-item label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-light);
      margin-bottom: 0.1rem;
    }
    .time-item span {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      color: var(--teal-dark);
    }
    .time-arrow { color: var(--sand-mid); font-size: 1.2rem; }

    /* ══════════════════════════════════════════
       FILTER TABS
    ══════════════════════════════════════════ */
    .filter-band {
      background: var(--sand);
      padding: var(--gap-md) var(--gap-md) 0;
      display: flex;
      justify-content: center;
      gap: 2rem;
      overflow-x: auto;
    }
    .filter-tab {
      background: none;
      border: none;
      padding: 0.8rem 0;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }
    .filter-tab.active {
      color: var(--teal-dark);
      border-bottom-color: var(--teal);
    }

    /* ══════════════════════════════════════════
       ACCOMMODATION GRID
    ══════════════════════════════════════════ */
    .accom-body {
      background: var(--sand);
      padding: var(--gap-lg) var(--gap-md) var(--gap-xxl);
    }
    .accom-grid {
      max-width: var(--container);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--gap-lg);
    }

    .room-card {
      background: #fff;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      transition: transform var(--dur-fast);
    }
    .room-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    
    .room-card-img { height: 220px; position: relative; }
    .room-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .room-card-badge {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255, 255, 255, 0.95);
      color: var(--teal-dark); padding: 0.3rem 0.8rem;
      border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    }

    .room-card-body { padding: var(--gap-lg); display: flex; flex-direction: column; flex: 1; }
    .room-card-title { font-family: var(--font-serif); font-size: 1.4rem; color: var(--text-dark); margin-bottom: 0.2rem; }
    .room-card-pax { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 1rem; }
    .room-card-desc { font-size: 0.9rem; color: var(--text-mid); line-height: 1.5; margin-bottom: 1.5rem; flex: 1; }
    
    .room-card-rates {
      border-top: 1px solid var(--sand-dark); padding-top: 1rem; margin-bottom: 1.5rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }
    .room-rate-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); display: block; margin-bottom: 0.2rem; }
    .room-rate-price { font-family: var(--font-serif); font-size: 1.2rem; color: var(--teal-dark); font-weight: 500; display: block;}
    
    /* ── Mobile Spacing Fixes ── */
    @media (max-width: 768px) {
      #accom-hero { padding-top: 100px; padding-bottom: 2rem; min-height: auto; }
      .accom-body { padding: var(--gap-lg) var(--gap-sm); }
      .accom-grid { gap: var(--gap-md); }
      .filter-band { gap: 1rem; padding: var(--gap-sm); }
      .time-block { padding: var(--gap-md); flex-direction: column; text-align: center; }
      .time-row { justify-content: center; }
      .room-card-body { padding: var(--gap-md); }
    }

  </style>
</head>
<body>

  <section id="accom-hero">
    <div class="accom-hero-bg"></div>
    <div class="accom-hero-content">
      <div class="eyebrow">Aroma Tiblawan · Governor Generoso</div>
      <h1 class="reveal">Find Your Perfect Stay</h1>
      <p class="reveal reveal-delay-1">From breezy beachfront cottages to a premium air-conditioned suite — every space is designed for rest, bonding, and celebration.</p>
    </div>
  </section>

  <div class="time-banner reveal reveal-delay-2">
    <div class="time-block">
      <span class="time-icon">☀️</span>
      <div class="time-details">
        <h4>Day Tour</h4>
        <div class="time-row">
          <div class="time-item"><label>Check-in</label><span>8:00 AM</span></div>
          <div class="time-arrow">→</div>
          <div class="time-item"><label>Check-out</label><span>5:00 PM</span></div>
        </div>
      </div>
    </div>
    <div class="time-block">
      <span class="time-icon">🌙</span>
      <div class="time-details">
        <h4>Overnight Stay</h4>
        <div class="time-row">
          <div class="time-item"><label>Check-in</label><span>2:00 PM</span></div>
          <div class="time-arrow">→</div>
          <div class="time-item"><label>Check-out</label><span>12:00 PM (Noon)</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-band">
    <button class="filter-tab active" onclick="filterRooms('all', this)">🌊 All</button>
    <button class="filter-tab" onclick="filterRooms('Shore Cottage', this)">🌴 Shore Cottages</button>
    <button class="filter-tab" onclick="filterRooms('Top Cottage', this)">🛖 Top Cottage</button>
    <button class="filter-tab" onclick="filterRooms('Primary Suite', this)">❄️ Primary Suite</button>
  </div>

  <section class="accom-body">
    <div class="accom-grid" id="accom-grid">
      </div>
  </section>

  <footer id="footer"></footer>

  <script src="data/resort-data.js"></script>
  <script src="scripts/components/navbar.js"></script>
  <script src="scripts/components/social-proof-toast.js"></script>
  <script src="scripts/main.js"></script>

  <script>
    // ── Render Cards ─────────────────────────────────────────
    function renderAccommodations(filterKeyword = 'all') {
      const grid = document.getElementById('accom-grid');
      let rooms = ResortData.accommodations;

      // Filter logic
      if (filterKeyword !== 'all') {
        rooms = rooms.filter(room => room.name.toLowerCase().includes(filterKeyword.toLowerCase()));
      }

      grid.innerHTML = rooms.map(room => {
        let ratesHTML = '';
        
        // Check if it is the Whole Resort (flat rate) or standard Day/Night rates
        if (room.flatRate) {
          ratesHTML = `
            <div style="grid-column: span 2;">
              <span class="room-rate-label">Flat Rate (Up to ${room.capacity} pax)</span>
              <span class="room-rate-price">${formatPHP(room.flatRate.price)}</span>
            </div>
          `;
        } else {
          ratesHTML = `
            <div>
              <span class="room-rate-label">Day Tour</span>
              <span class="room-rate-price">${formatPHP(room.dayTour.price)}</span>
            </div>
            <div>
              <span class="room-rate-label">Overnight</span>
              <span class="room-rate-price">${formatPHP(room.overnight.price)}</span>
            </div>
          `;
        }

        return `
          <div class="room-card reveal">
            <div class="room-card-img">
              <img src="${room.image}" alt="${room.name}" loading="lazy" />
              <div class="room-card-badge">${room.badge}</div>
            </div>
            <div class="room-card-body">
              <h3 class="room-card-title">${room.name}</h3>
              <div class="room-card-pax">👥 Up to ${room.capacity} pax</div>
              <p class="room-card-desc">${room.description}</p>
              
              <div class="room-card-rates">
                ${ratesHTML}
              </div>
              
              <a href="booking.html?room=${room.id}" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Book this space
              </a>
            </div>
          </div>
        `;
      }).join('');

      // Trigger scroll animations for the newly rendered cards
      if(typeof initReveal === 'function') initReveal();
    }

    // ── Handle Tab Clicks ────────────────────────────────────
    function filterRooms(keyword, btnElement) {
      // Remove active class from all tabs
      document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active'));
      // Add active class to clicked tab
      btnElement.classList.add('active');
      
      // Render the specific rooms
      renderAccommodations(keyword);
    }

    // ── Page Initialization ──────────────────────────────────
    function PageInit() {
      // Draw all rooms initially when the page loads
      renderAccommodations('all');
    }
  </script>
</body>
</html>
